name: vTarla
version: 1.0.0
description: Advanced Farm System Plugin for Paper 1.21
author: Vixians
main: com.vixians.tarla.TarlaPlugin
api-version: "1.21"
website: "https://github.com/Vixians/vTarla"

commands:
  tarla:
    description: Main vTarla command
    usage: /tarla [help|reload|stats|profile|market|multiplier]
    permission: tarla.command
    aliases: [t]

  tarlamarket:
    description: Open Tarla Market
    usage: /tarlamarket
    permission: tarla.market
    aliases: [tmarket, tm]

  tarlamultiplier:
    description: Open Multiplier GUI
    usage: /tarlamultiplier
    permission: tarla.multiplier
    aliases: [tmultiplier, tmult, tx]

  taladiscount:
    description: Manage discounts
    usage: /taladiscount [set|remove] <amount>
    permission: tarla.admin.discount
    aliases: [tdiscount]

  taladmin:
    description: Admin commands
    usage: /taladmin [backup|stats|reload]
    permission: tarla.admin.*
    aliases: [tadmin]

permissions:
  tarla.*:
    description: Full vTarla access
    default: op
    children:
      tarla.command: true
      tarla.market: true
      tarla.multiplier: true
      tarla.admin.*: true
  
  tarla.command:
    description: Use /tarla command
    default: true
  
  tarla.market:
    description: Access market
    default: true
  
  tarla.multiplier:
    description: Access multiplier system
    default: true
  
  tarla.multiplier.bronze:
    description: Bronze multiplier access
    default: true
  
  tarla.multiplier.silver:
    description: Silver multiplier access
    default: op
  
  tarla.multiplier.gold:
    description: Gold multiplier access
    default: op
  
  tarla.multiplier.diamond:
    description: Diamond multiplier access
    default: op
  
  tarla.multiplier.emerald:
    description: Emerald multiplier access
    default: op
  
  tarla.admin.*:
    description: All admin permissions
    default: op
    children:
      tarla.admin.reload: true
      tarla.admin.discount: true
      tarla.admin.multiplier: true
      tarla.admin.setworldfarm: true
      tarla.admin.backup: true
  
  tarla.admin.reload:
    description: Reload plugin
    default: op
  
  tarla.admin.discount:
    description: Manage discounts
    default: op
  
  tarla.admin.multiplier:
    description: Manage multipliers
    default: op
  
  tarla.admin.setworldfarm:
    description: Set farm world
    default: op
  
  tarla.admin.backup:
    description: Create backups
    default: op
